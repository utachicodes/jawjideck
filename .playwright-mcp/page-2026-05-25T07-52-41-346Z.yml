      - generic [ref=e133]:
        - paragraph [ref=e134]: Features
        - heading "Everything you need in one app" [level=2] [ref=e135]
        - paragraph [ref=e136]: From telemetry monitoring to firmware flashing, ArduDeck replaces multiple tools with a single, modern interface.
      - generic [ref=e137]:
        - generic [ref=e140]:
          - img [ref=e142]
          - heading "Real-Time Telemetry" [level=3] [ref=e144]
          - paragraph [ref=e145]: Live attitude indicator, GPS tracking, battery monitoring, and customizable dockable panels. See everything at a glance.
        - generic [ref=e148]:
          - img [ref=e150]
          - heading "Mission Planning" [level=3] [ref=e152]
          - paragraph [ref=e153]: Waypoint CRUD, spline curves, terrain-aware altitude profiles, geofence polygons, and rally points on interactive maps.
        - generic [ref=e156]:
          - img [ref=e158]
          - heading "Full Parameter Management" [level=3] [ref=e161]
          - paragraph [ref=e162]: Browse, search, and edit every flight controller parameter with metadata, validation, and import/export from files.
        - generic [ref=e165]:
          - img [ref=e167]
          - heading "Firmware Flashing" [level=3] [ref=e169]
          - paragraph [ref=e170]: Multi-protocol board detection, STM32 DFU flashing, and automatic post-flash configuration. One-click firmware updates.
        - generic [ref=e173]:
          - img [ref=e175]
          - heading "Lua Graphical Editor" [level=3] [ref=e177]
          - paragraph [ref=e178]: Visual node-based scripting editor for ArduPilot Lua scripts. Drag-and-drop nodes, connect logic flows, and compile to Lua with live preview.
        - generic [ref=e181]:
          - img [ref=e183]
          - heading "OSD Simulator" [level=3] [ref=e185]
          - paragraph [ref=e186]: On-screen display preview with MCM font parsing, live and demo modes, 8 bundled fonts, and PAL/NTSC support.
        - generic [ref=e189]:
          - img [ref=e191]
          - heading "MSP CLI Terminal" [level=3] [ref=e193]
          - paragraph [ref=e194]: Built-in terminal for iNav and Betaflight boards with autocomplete, command history, and save/reboot handling.
        - generic [ref=e197]:
          - img [ref=e199]
          - heading "Calibration Wizard" [level=3] [ref=e201]
          - paragraph [ref=e202]: Step-by-step accelerometer and compass calibration with live status detection from arming flags.
        - generic [ref=e205]:
          - img [ref=e207]
          - heading "Native on macOS, Windows & Linux" [level=3] [ref=e209]
          - paragraph [ref=e210]: First-class macOS support with dedicated Apple Silicon and Intel builds. Also runs natively on Windows 10+ and Linux (x86_64).
