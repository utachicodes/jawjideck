        - heading "Thank you to Adlerblix" [level=1] [ref=e34]
        - paragraph [ref=e35]: A note of thanks to Adlerblix, a German aerial surveying company who donated hardware that directly supports ArduDeck development - RTK GPS, depth cameras, and compute.
        - generic [ref=e36]:
          - generic [ref=e37]: sponsors
          - generic [ref=e38]: community
          - generic [ref=e39]: hardware
          - generic [ref=e40]: thanks
      - generic [ref=e41]:
        - paragraph [ref=e42]: A quick post outside the usual release notes. ArduDeck has a new sponsor, and it deserves more than a single line at the bottom of the README.
        - paragraph [ref=e43]:
          - link "Adlerblix" [ref=e44] [cursor=pointer]:
            - /url: https://adlerblix.de
          - text: is a German aerial surveying company. Their day job is optical aerial surveying - photogrammetry, RTK-precision drone and fixed-wing mapping, large-area capture. The kind of work where centimeter-level positioning and well-behaved flight automation are not nice-to-haves, they are the product.
        - paragraph [ref=e45]: They recently donated a significant batch of hardware to ArduDeck. RTK GPS modules, depth cameras, and compute. The same class of gear that drives a lot of their own field work. For an open-source project, that is the difference between testing features against a SITL and testing them against the real world, on real frames, with real RTK fixes and real sensor noise. It changes what the project can ship and how confidently it can ship it.
        - paragraph [ref=e46]: There is no commercial arrangement here. Nothing was traded, no roadmap was promised. Adlerblix saw the project, used it, and decided to put hardware behind it. That is rare, and it should be said out loud.
        - paragraph [ref=e47]:
          - text: If you do aerial surveying work in Europe and want a serious team for that kind of capture, take a look at what they do at
          - link "adlerblix.de" [ref=e48] [cursor=pointer]:
            - /url: https://adlerblix.de
          - text: .
        - paragraph [ref=e49]: Thank you.
