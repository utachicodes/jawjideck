name: Check ArduPilot New Release

# Checks weekly if ArduPilot has released a new stable version.
# If a newer version is found, creates a P0 issue to rebuild SITL binaries.

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new ArduPilot stable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Current version we track
          CURRENT="Copter-4.5.7"

          # Get latest stable Copter release tag from ArduPilot
          LATEST=$(gh api repos/ArduPilot/ardupilot/releases \
            --jq '[.[] | select(.tag_name | startswith("Copter-")) | select(.prerelease == false)] | sort_by(.published_at) | last | .tag_name')

          echo "Current: $CURRENT"
          echo "Latest:  $LATEST"

          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Could not fetch latest release, skipping"
            exit 0
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Up to date"
            exit 0
          fi

          echo "New release detected: $LATEST"

          # Check if issue already exists
          EXISTING=$(gh issue list --search "ArduPilot $LATEST SITL" --state open --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "Issue already exists, skipping"
            exit 0
          fi

          # Create P0 issue
          gh issue create \
            --title "Rebuild SITL binaries for ArduPilot $LATEST" \
            --label "priority:P0,sitl,maintenance" \
            --body "$(cat <<EOF
          A new ArduPilot stable release has been detected: **$LATEST** (current: $CURRENT)

          ## Action required

          1. Update \`DEFAULT_ARDUPILOT_REF\` in \`.github/workflows/build-sitl.yml\` to \`$LATEST\`
          2. Update \`SITL_RELEASE_TAG\` in \`apps/desktop/src/main/sitl/ardupilot-sitl-downloader.ts\`
          3. Build macOS ARM64 binaries locally:
             \`\`\`bash
             cd /tmp && git clone --depth 1 --branch $LATEST --recurse-submodules --shallow-submodules https://github.com/ArduPilot/ardupilot.git
             cd ardupilot && ./waf configure --board sitl && ./waf copter plane rover sub
             \`\`\`
          4. Upload to GitHub release:
             \`\`\`bash
             VERSION=\$(echo "$LATEST" | sed 's/Copter-//')
             gh release create sitl-v\$VERSION --title "ArduPilot SITL \$VERSION" --prerelease build/sitl/bin/*-macos-arm64
             \`\`\`
          5. Trigger the \`Build ArduPilot SITL Binaries\` workflow for Linux x64
          6. Test SITL in ArduDeck

          _Auto-generated by check-ardupilot-release workflow_
          EOF
          )"
